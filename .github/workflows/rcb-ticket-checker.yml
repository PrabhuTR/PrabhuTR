name: RCB Ticket Checker

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check RCB Website for Tickets
        id: check-tickets
        run: |
          echo "Checking RCB official website for ticket availability..."

          # RCB official tickets page
          TICKETS_URL="https://www.royalchallengers.com/tickets"

          # Fetch the page content
          RESPONSE=$(curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$TICKETS_URL" || echo "FETCH_FAILED")

          if [ "$RESPONSE" = "FETCH_FAILED" ]; then
            echo "Failed to fetch the website"
            echo "tickets_available=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Save response for debugging
          echo "$RESPONSE" > page_content.html

          # Check for various indicators that tickets are available
          # Look for "Book Now", "Buy Tickets", "Available", or booking-related keywords
          if echo "$RESPONSE" | grep -iE "(book now|buy ticket|tickets available|get tickets|book tickets|on sale)" | grep -ivE "(sold out|coming soon|not available|unavailable)" > /dev/null; then
            echo "🎟️ TICKETS MIGHT BE AVAILABLE!"
            echo "tickets_available=true" >> $GITHUB_OUTPUT
          elif echo "$RESPONSE" | grep -iE "(sold out|coming soon|not available|unavailable|no tickets)" > /dev/null; then
            echo "❌ Tickets not currently available or sold out"
            echo "tickets_available=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Could not determine ticket status - manual check recommended"
            echo "tickets_available=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram Alert
        if: steps.check-tickets.outputs.tickets_available == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
          MESSAGE=$(cat <<'EOF'
          🚨🚨🚨 RCB TICKET ALERT 🚨🚨🚨

          🎟️ TICKETS ARE AVAILABLE NOW!

          🏏 Royal Challengers Bangalore tickets detected!

          📱 BOOK IMMEDIATELY:
          • RCB Official: https://www.royalchallengers.com/tickets
          • BookMyShow: https://in.bookmyshow.com/sports/ipl-royal-challengers-bangalore

          ⚡ HURRY! IPL tickets sell out in minutes!

          🔴 GO RCB! 🔴
          EOF
          )
          MESSAGE="${MESSAGE}

          ⏰ Detected: ${TIMESTAMP}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "disable_notification=false"

          echo "📨 Telegram alert sent!"

      - name: Create GitHub Issue if Tickets Available
        if: steps.check-tickets.outputs.tickets_available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🎟️ RCB Tickets May Be Available!';
            const body = `## RCB Ticket Alert! 🏏

            The automated checker detected that tickets might be available on the RCB website.

            **Quick Links:**
            - [RCB Official Tickets Page](https://www.royalchallengers.com/tickets)
            - [BookMyShow RCB](https://in.bookmyshow.com/sports/ipl-royal-challengers-bangalore)

            ⏰ **Detected at:** ${new Date().toISOString()}

            ---
            *This is an automated notification. Please verify ticket availability manually.*`;

            // Check if a similar open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rcb-tickets'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('RCB Tickets') &&
              Date.now() - new Date(issue.created_at).getTime() < 24 * 60 * 60 * 1000
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['rcb-tickets', 'automated']
              });
              console.log('Created new ticket alert issue');
            } else {
              // Add a comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 **Update:** Tickets still appear to be available as of ${new Date().toISOString()}`
              });
              console.log('Added comment to existing issue');
            }

      - name: Log Status
        run: |
          echo "=========================================="
          echo "RCB Ticket Check Complete"
          echo "Time: $(date)"
          echo "Status: ${{ steps.check-tickets.outputs.tickets_available }}"
          echo "=========================================="
