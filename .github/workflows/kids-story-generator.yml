              img.save(output_path)
              return output_path

          def get_font(size):
              """Get a font that works on Linux/GitHub Actions"""
              from PIL import ImageFont
              font_paths = [
                  "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                  "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf",
                  "/usr/share/fonts/truetype/freefont/FreeSansBold.ttf",
                  "/usr/share/fonts/TTF/DejaVuSans-Bold.ttf",
              ]
              for font_path in font_paths:
                  if os.path.exists(font_path):
                      try:
                          return ImageFont.truetype(font_path, size)
                      except:
                          pass
              # Fallback to default
              return ImageFont.load_default()

          def create_thumbnail(title, moral, output_path):
              """Create eye-catching YouTube thumbnail with title text"""
              img = Image.new('RGB', (1280, 720), (255, 100, 150))
              draw = ImageDraw.Draw(img)

              # Rainbow gradient
              colors = [(255,100,100), (255,165,0), (255,255,0), (0,255,0), (0,150,255), (150,0,255)]
              stripe_height = 720 // len(colors)
              for i, color in enumerate(colors):
                  y_start = i * stripe_height
                  draw.rectangle([0, y_start, 1280, y_start + stripe_height], fill=color)

              # Add semi-transparent overlay
              overlay = Image.new('RGBA', (1280, 720), (0, 0, 0, 120))
              img = img.convert('RGBA')
              img = Image.alpha_composite(img, overlay)
              img = img.convert('RGB')
              draw = ImageDraw.Draw(img)

              # Add white banner for title
              draw.rectangle([60, 280, 1220, 440], fill=(255, 255, 255), outline=(255, 215, 0), width=8)

              # Add decorative stars
              for _ in range(20):
                  x, y = random.randint(50, 1230), random.randint(30, 250)
                  draw.text((x, y), "★", fill=(255, 255, 0))

              # DRAW THE TITLE TEXT
              title_font = get_font(60)
              # Truncate title if too long
              display_title = title[:40] + "..." if len(title) > 40 else title
              # Center the title
              try:
                  bbox = draw.textbbox((0, 0), display_title, font=title_font)
                  text_width = bbox[2] - bbox[0]
              except:
                  text_width = len(display_title) * 30  # Estimate
              x_pos = (1280 - text_width) // 2
              draw.text((x_pos, 320), display_title, fill=(50, 50, 150), font=title_font)

              # Add "KIDS STORY" label at top
              label_font = get_font(40)
              draw.text((480, 480), "★ KIDS STORY ★", fill=(255, 215, 0), font=label_font)

              img.save(output_path)
              return output_path

          def create_ending_card(moral, output_path):
              """Create THE END card with moral lesson"""
              img = Image.new('RGB', (1280, 720), (75, 0, 130))  # Indigo
              draw = ImageDraw.Draw(img)

              # Gradient
              for y in range(720):
                  r = int(75 + (138 - 75) * y / 720)
                  g = int(0 + (43 - 0) * y / 720)
                  b = int(130 + (226 - 130) * y / 720)
                  draw.line([(0, y), (1280, y)], fill=(r, g, b))

              # Add stars
              for _ in range(40):
                  x, y = random.randint(20, 1260), random.randint(20, 700)
                  size = random.randint(2, 7)
                  draw.ellipse([x-size, y-size, x+size, y+size], fill=(255, 255, 220))

              # DRAW THE END TEXT
              title_font = get_font(100)
              draw.text((450, 200), "THE END", fill=(255, 215, 0), font=title_font)

              # Draw moral text
              moral_font = get_font(36)
              # Truncate moral if too long
              display_moral = moral[:80] + "..." if len(moral) > 80 else moral
              try:
                  bbox = draw.textbbox((0, 0), display_moral, font=moral_font)
                  text_width = bbox[2] - bbox[0]
              except:
                  text_width = len(display_moral) * 18
              x_pos = max(50, (1280 - text_width) // 2)
              draw.text((x_pos, 380), display_moral, fill=(255, 255, 255), font=moral_font)

              # Add subscribe text
              sub_font = get_font(30)
              draw.text((400, 550), "★ SUBSCRIBE FOR MORE STORIES ★", fill=(255, 200, 100), font=sub_font)

              img.save(output_path)
              return output_path

          def create_video(story):
              """Create the full video with intro, thumbnail, and ending"""
