              thumb_path = OUTPUT_DIR / "thumbnail.jpg"
              create_thumbnail(title, moral, thumb_path)
              print(f"Thumbnail saved: {thumb_path}")

              # Optimized Ken Burns effect - smoother and faster rendering
              def create_cinematic_clip(img_path, duration, effect_type):
                  """Create smooth cinematic Ken Burns effect with optimized performance"""
                  w, h = 1280, 720

                  # Load and resize image larger for zoom/pan headroom
                  pil_img = Image.open(str(img_path))
                  pil_img = pil_img.resize((1600, 900), Image.Resampling.LANCZOS)  # 25% larger

                  # Convert to numpy for faster processing
                  import numpy as np
                  img_array = np.array(pil_img)

                  def make_frame(t):
                      progress = t / duration  # 0 to 1

                      if effect_type == 'zoom_in':
                          # Smooth zoom in: start at full view, end zoomed in
                          scale = 1.0 + (0.15 * progress)  # 1.0 to 1.15
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      elif effect_type == 'zoom_out':
                          # Smooth zoom out: start zoomed in, end at full view
                          scale = 1.15 - (0.15 * progress)  # 1.15 to 1.0
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      elif effect_type == 'pan_right':
                          # Smooth pan from left to right
                          crop_w, crop_h = 1280, 720
                          x1 = int((1600 - 1280) * progress)  # 0 to 320
                          y1 = (900 - 720) // 2

                      elif effect_type == 'pan_left':
                          # Smooth pan from right to left
                          crop_w, crop_h = 1280, 720
                          x1 = int((1600 - 1280) * (1 - progress))  # 320 to 0
                          y1 = (900 - 720) // 2

                      elif effect_type == 'zoom_pan_right':
                          # Zoom in while panning right
                          scale = 1.0 + (0.1 * progress)
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = int((1600 - crop_w) * progress * 0.5)
                          y1 = (900 - crop_h) // 2

                      else:  # subtle
                          # Very subtle zoom for calm scenes
                          scale = 1.0 + (0.08 * progress)
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      # Crop and resize to output dimensions
                      cropped = img_array[y1:y1+crop_h, x1:x1+crop_w]
                      # Use PIL for high-quality resize
                      pil_cropped = Image.fromarray(cropped)
                      pil_resized = pil_cropped.resize((w, h), Image.Resampling.LANCZOS)
                      return np.array(pil_resized)

                  from moviepy.video.VideoClip import VideoClip
                  clip = VideoClip(make_frame, duration=duration)
                  return clip

              # ANIMATION STYLE: More dynamic effects for cartoon-like feel
              # Faster movements, more variety, action-oriented
              effect_types = [
                  'zoom_in_fast', 'pan_right_bounce', 'zoom_out_fast', 'pan_left_bounce',
                  'zoom_shake', 'pan_right_fast', 'zoom_in_bounce', 'pan_left_fast'
              ]

              def create_animated_clip(img_path, duration, effect_type):
                  """Create DYNAMIC animated clip with faster movements like cartoons"""
                  w, h = 1280, 720
                  import numpy as np
                  import math

                  # Verify image exists and load it
                  if not os.path.exists(str(img_path)):
                      raise FileNotFoundError(f"Image not found: {img_path}")

                  pil_img = Image.open(str(img_path))
                  pil_img = pil_img.convert('RGB')  # Ensure RGB mode
                  pil_img = pil_img.resize((1920, 1080), Image.Resampling.LANCZOS)
                  img_array = np.array(pil_img)

                  # Pre-compute the base frame for efficiency
                  base_h, base_w = img_array.shape[:2]

                  def make_frame(t):
                      progress = t / max(duration, 0.001)  # Avoid division by zero
                      bounce = math.sin(progress * math.pi * 4) * 0.02

                      speed = 0.25 if 'fast' in effect_type else 0.18

                      if 'zoom_in' in effect_type:
                          scale = 1.0 + (speed * progress) + bounce
                          crop_w = int(base_w / scale)
                          crop_h = int(base_h / scale)
                          x1 = (base_w - crop_w) // 2
                          y1 = (base_h - crop_h) // 2
                      elif 'zoom_out' in effect_type:
                          scale = 1.0 + speed - (speed * progress) + bounce
                          crop_w = int(base_w / scale)
                          crop_h = int(base_h / scale)
                          x1 = (base_w - crop_w) // 2
                          y1 = (base_h - crop_h) // 2
                      elif 'pan_right' in effect_type:
                          crop_w, crop_h = 1280, 720
                          x1 = int((base_w - 1280) * progress)
                          y1 = (base_h - 720) // 2 + int(bounce * 50)
                      elif 'pan_left' in effect_type:
                          crop_w, crop_h = 1280, 720
                          x1 = int((base_w - 1280) * (1 - progress))
                          y1 = (base_h - 720) // 2 + int(bounce * 50)
                      elif 'shake' in effect_type:
                          scale = 1.1 + bounce * 2
                          crop_w = int(base_w / scale)
                          crop_h = int(base_h / scale)
                          shake_x = int(math.sin(progress * math.pi * 8) * 20)
                          shake_y = int(math.cos(progress * math.pi * 8) * 15)
                          x1 = (base_w - crop_w) // 2 + shake_x
                          y1 = (base_h - crop_h) // 2 + shake_y
                      else:  # bounce default
                          scale = 1.0 + (0.1 * progress) + bounce
                          crop_w = int(base_w / scale)
                          crop_h = int(base_h / scale)
                          x1 = (base_w - crop_w) // 2
                          y1 = (base_h - crop_h) // 2

                      # Clamp values to valid range
                      crop_w = max(100, min(crop_w, base_w))
                      crop_h = max(100, min(crop_h, base_h))
                      x1 = max(0, min(x1, base_w - crop_w))
                      y1 = max(0, min(y1, base_h - crop_h))

                      cropped = img_array[y1:y1+crop_h, x1:x1+crop_w]
                      pil_cropped = Image.fromarray(cropped)
                      pil_resized = pil_cropped.resize((w, h), Image.Resampling.LANCZOS)
                      return np.array(pil_resized)

                  from moviepy.video.VideoClip import VideoClip
                  clip = VideoClip(make_frame, duration=duration)
                  clip = clip.set_fps(30)  # IMPORTANT: Set FPS for proper video output
                  return clip

              # Process each scene with ANIMATED effects
              for i, scene in enumerate(scenes):
                  narration_preview = scene['narration'][:60].replace('\n', ' ')
                  print(f"\nScene {i+1}/{len(scenes)}: {narration_preview}...")

