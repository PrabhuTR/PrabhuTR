name: Daily Kids Story Generator

on:
  schedule:
    # Run daily at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Generate test video (shorter)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      language:
        description: 'Video language'
        required: false
        default: 'english'
        type: choice
        options:
          - 'english'
          - 'hindi'
          - 'tamil'
          - 'telugu'
          - 'kannada'
          - 'malayalam'
          - 'bengali'
          - 'marathi'

permissions:
  contents: write  # Required to create GitHub releases

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Increased for cinematic Ken Burns effects and quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation fonts-freefont-ttf
          # Verify fonts are installed
          fc-list | grep -i dejavu || echo "DejaVu fonts installed"

      - name: Install Python dependencies
        run: |
          pip install edge-tts "moviepy==1.0.3" pillow requests google-auth-oauthlib google-api-python-client decorator imageio imageio-ffmpeg

      - name: Setup YouTube credentials
        run: |
          echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Generate Kids Story Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TEST_MODE: ${{ inputs.test_mode }}
          VIDEO_LANGUAGE: ${{ inputs.language || 'english' }}
        run: |
