name: Daily Kids Story Generator

on:
  schedule:
    # Run daily at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Generate test video (shorter)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      language:
        description: 'Video language'
        required: false
        default: 'english'
        type: choice
        options:
          - 'english'
          - 'hindi'
          - 'tamil'
          - 'telugu'
          - 'kannada'
          - 'malayalam'
          - 'bengali'
          - 'marathi'

permissions:
  contents: write  # Required to create GitHub releases

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Increased for cinematic Ken Burns effects and quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install edge-tts "moviepy==1.0.3" pillow requests google-auth-oauthlib google-api-python-client decorator imageio imageio-ffmpeg

      - name: Setup YouTube credentials
        run: |
          echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Generate Kids Story Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TEST_MODE: ${{ inputs.test_mode }}
          VIDEO_LANGUAGE: ${{ inputs.language || 'english' }}
        run: |
          python << 'SCRIPT'
          import os
          import json
          import asyncio
          import requests
          from pathlib import Path
          from datetime import datetime
          import random
          import edge_tts
          from moviepy.editor import (
              ImageClip, AudioFileClip, concatenate_videoclips,
              CompositeVideoClip, ColorClip, TextClip
          )
          from PIL import Image, ImageDraw, ImageFont
          from io import BytesIO

          # Configuration
          OUTPUT_DIR = Path("./output")
          TEMP_DIR = Path("./temp")
          OUTPUT_DIR.mkdir(exist_ok=True)
          TEMP_DIR.mkdir(exist_ok=True)

          TEST_MODE = os.environ.get('TEST_MODE', 'false') == 'true'
          GROQ_API_KEY = os.environ.get('GROQ_API_KEY', '')
          VIDEO_LANGUAGE = os.environ.get('VIDEO_LANGUAGE', 'english').lower()

          # For 10-minute CINEMATIC video with smooth Ken Burns effect (zoom/pan on images)
          # Each scene: 15-20 seconds with zoom/pan animation for professional look
          # 35 scenes × ~18 seconds = ~10 minutes of cinematic content
          NUM_SCENES = 8 if TEST_MODE else 35

          # Multi-language voice configuration (Edge-TTS - FREE)
          # All voices are kid-friendly female voices
          LANGUAGE_CONFIG = {
              "english": {
                  "voice": "en-US-AnaNeural",  # Cheerful American voice
                  "lang_code": "en",
                  "name": "English"
              },
              "hindi": {
                  "voice": "hi-IN-SwaraNeural",  # Hindi female voice
                  "lang_code": "hi",
                  "name": "Hindi"
              },
              "tamil": {
                  "voice": "ta-IN-PallaviNeural",  # Tamil female voice
                  "lang_code": "ta",
                  "name": "Tamil"
              },
              "telugu": {
                  "voice": "te-IN-ShrutiNeural",  # Telugu female voice
                  "lang_code": "te",
                  "name": "Telugu"
              },
              "kannada": {
                  "voice": "kn-IN-SapnaNeural",  # Kannada female voice
                  "lang_code": "kn",
                  "name": "Kannada"
              },
              "malayalam": {
                  "voice": "ml-IN-SobhanaNeural",  # Malayalam female voice
                  "lang_code": "ml",
                  "name": "Malayalam"
              },
              "bengali": {
                  "voice": "bn-IN-TanishaaNeural",  # Bengali female voice
                  "lang_code": "bn",
                  "name": "Bengali"
              },
              "marathi": {
                  "voice": "mr-IN-AarohiNeural",  # Marathi female voice
