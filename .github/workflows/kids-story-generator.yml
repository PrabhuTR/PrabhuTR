      # YouTube upload is disabled - use youtube-uploader.yml workflow instead
      # To enable: run the separate "Upload to YouTube" workflow after reviewing the video

      - name: Prepare release files
        id: prepare-release
        run: |
          # Get video info from metadata
          if [ -f video_metadata.json ]; then
            TITLE=$(cat video_metadata.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('title', 'Unknown'))")
            MORAL=$(cat video_metadata.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('moral', 'Be kind!'))")
            LANGUAGE=$(cat video_metadata.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('language', 'English'))")
          else
            TITLE="Kids-Story"
            MORAL="Be kind and good!"
            LANGUAGE="English"
          fi

          # Create tag-safe name (lowercase, no spaces, no special chars)
          TAG_NAME=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          TAG_NAME="${TAG_NAME}-$(date +%Y%m%d-%H%M%S)"

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "moral=$MORAL" >> $GITHUB_OUTPUT
          echo "language=$LANGUAGE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Find video file
          VIDEO_FILE=$(find ./output -name "*.mp4" -type f | head -1)
          echo "video_file=$VIDEO_FILE" >> $GITHUB_OUTPUT

          echo "Tag: $TAG_NAME"
          echo "Title: $TITLE"
          echo "Video: $VIDEO_FILE"

      - name: Upload video and thumbnail as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: kids-story-video
          path: |
            output/*.mp4
            output/thumbnail.jpg
            video_metadata.json
          retention-days: 7

      - name: Create GitHub Release with video
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.prepare-release.outputs.tag_name }}
          name: "🎬 ${{ steps.prepare-release.outputs.title }}"
          body: |
            ## 📖 Kids Story Video

            **Title:** ${{ steps.prepare-release.outputs.title }}
            **Language:** ${{ steps.prepare-release.outputs.language }}
            **Moral:** ${{ steps.prepare-release.outputs.moral }}
            **Age Group:** 4+ years

            ---

            ### 📥 Download the video and thumbnail below

            ### 📺 To upload to YouTube:
            1. Go to **Actions** → **Upload to YouTube**
            2. Enter tag: `${{ steps.prepare-release.outputs.tag_name }}`
            3. Click **Run workflow**
          files: |
            ${{ steps.prepare-release.outputs.video_file }}
            output/thumbnail.jpg
            video_metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Kids Story Video Generator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Video generated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📖 **Story:** ${{ steps.prepare-release.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "🎓 **Moral:** ${{ steps.prepare-release.outputs.moral }}" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Language:** ${{ steps.prepare-release.outputs.language }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.prepare-release.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📺 To Upload to YouTube:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **Actions** → **Upload to YouTube**" >> $GITHUB_STEP_SUMMARY
          echo "2. Enter tag: \`${{ steps.prepare-release.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Click **Run workflow**" >> $GITHUB_STEP_SUMMARY
