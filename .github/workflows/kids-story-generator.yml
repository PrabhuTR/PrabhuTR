                          b = int(bg_color[2] * (1 - alpha * 0.3))
                          draw.line([(0, y), (1280, y)], fill=(r, g, b))
                      # Add circles
                      for _ in range(15):
                          x, y = random.randint(50, 1230), random.randint(50, 670)
                          size = random.randint(10, 30)
                          draw.ellipse([x-size, y-size, x+size, y+size], fill=(255, 255, 255))
                      placeholder.save(str(img_path), quality=95)
                      print(f"  ✓ Placeholder created: {os.path.getsize(str(img_path))} bytes")

                  # Create video clip - use simple approach first, then animated
                  clip = None
                  try:
                      # First try: Simple ImageClip (most reliable)
                      test_img = Image.open(str(img_path))
                      test_img = test_img.convert('RGB')
                      test_img = test_img.resize((1280, 720), Image.Resampling.LANCZOS)
                      test_img.save(str(img_path), quality=95)

                      # Try animated clip
                      clip = create_animated_clip(img_path, duration, effect)
                      clip = clip.set_audio(audio)
                      print(f"  ✓ Animated clip created")
                  except Exception as e:
                      print(f"  ⚠ Animation failed ({e}), using simple ImageClip...")
                      try:
                          clip = ImageClip(str(img_path))
                          clip = clip.set_duration(duration)
                          clip = clip.set_fps(30)
                          clip = clip.set_audio(audio)
                          print(f"  ✓ Static clip created")
                      except Exception as e2:
                          print(f"  ✗ ImageClip failed ({e2}), using ColorClip...")
                          clip = ColorClip(size=(1280, 720), color=(100, 150, 200), duration=duration)
                          clip = clip.set_fps(30)
                          clip = clip.set_audio(audio)
                          print(f"  ✓ ColorClip created as fallback")

                  if clip is not None:
                      clips.append(clip)
                      print(f"  ✓ Scene {i+1} added to video (duration: {duration:.1f}s)")
                  else:
                      print(f"  ✗ ERROR: Failed to create clip for scene {i+1}")

              # 4. Create ending card with moral
              print("\nCreating ending card...")
              ending_path = TEMP_DIR / "ending.jpg"
              create_ending_card(moral, ending_path)
              ending_audio_path = TEMP_DIR / "ending_audio.mp3"

              # Language-specific ending
              ending_texts = {
                  "en": f"And that's the end of our story! Remember children: {moral}. Please like and subscribe for more wonderful stories. See you next time! Goodbye!",
                  "hi": f"और यह हमारी कहानी का अंत है! याद रखें बच्चों: {moral}. अगली कहानी के लिए सब्सक्राइब करें! अलविदा!",
                  "ta": f"இது எங்கள் கதையின் முடிவு! நினைவில் கொள்ளுங்கள்: {moral}. மேலும் கதைகளுக்கு சந்தா செலுத்துங்கள்!",
                  "te": f"ఇది మా కథ ముగింపు! గుర్తుంచుకోండి: {moral}. మరిన్ని కథలకు సబ్స్క్రైబ్ చేయండి!",
                  "kn": f"ಇದು ನಮ್ಮ ಕಥೆಯ ಕೊನೆ! ನೆನಪಿಡಿ: {moral}. ಹೆಚ್ಚಿನ ಕಥೆಗಳಿಗೆ ಚಂದಾದಾರರಾಗಿ!",
                  "ml": f"ഇത് നമ്മുടെ കഥയുടെ അവസാനം! ഓർക്കുക: {moral}. കൂടുതൽ കഥകൾക്കായി സബ്സ്ക്രൈബ് ചെയ്യുക!",
                  "bn": f"এই আমাদের গল্পের শেষ! মনে রেখো: {moral}. আরও গল্পের জন্য সাবস্ক্রাইব করো!",
                  "mr": f"ही आमच्या गोष्टीचा शेवट! लक्षात ठेवा: {moral}. अधिक गोष्टींसाठी सबस्क्राइब करा!"
              }
              ending_text = ending_texts.get(LANG_CODE, ending_texts["en"])
              asyncio.run(generate_voiceover(ending_text, str(ending_audio_path)))
              ending_audio = AudioFileClip(str(ending_audio_path))
              ending_clip = ImageClip(str(ending_path)).set_duration(ending_audio.duration + 2).set_fps(30).set_audio(ending_audio)
              clips.append(ending_clip)

              # Combine clips
              print(f"\n{'='*60}")
              print(f"COMBINING VIDEO")
              print(f"{'='*60}")
              print(f"Total clips: {len(clips)} (1 intro + {len(scenes)} scenes + 1 ending)")
