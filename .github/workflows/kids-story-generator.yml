                  "hi": f"और यह हमारी कहानी का अंत है! याद रखें बच्चों: {moral}. अगली कहानी के लिए सब्सक्राइब करें! अलविदा!",
                  "ta": f"இது எங்கள் கதையின் முடிவு! நினைவில் கொள்ளுங்கள்: {moral}. மேலும் கதைகளுக்கு சந்தா செலுத்துங்கள்!",
                  "te": f"ఇది మా కథ ముగింపు! గుర్తుంచుకోండి: {moral}. మరిన్ని కథలకు సబ్స్క్రైబ్ చేయండి!",
                  "kn": f"ಇದು ನಮ್ಮ ಕಥೆಯ ಕೊನೆ! ನೆನಪಿಡಿ: {moral}. ಹೆಚ್ಚಿನ ಕಥೆಗಳಿಗೆ ಚಂದಾದಾರರಾಗಿ!",
                  "ml": f"ഇത് നമ്മുടെ കഥയുടെ അവസാനം! ഓർക്കുക: {moral}. കൂടുതൽ കഥകൾക്കായി സബ്സ്ക്രൈബ് ചെയ്യുക!",
                  "bn": f"এই আমাদের গল্পের শেষ! মনে রেখো: {moral}. আরও গল্পের জন্য সাবস্ক্রাইব করো!",
                  "mr": f"ही आमच्या गोष्टीचा शेवट! लक्षात ठेवा: {moral}. अधिक गोष्टींसाठी सबस्क्राइब करा!"
              }
              ending_text = ending_texts.get(LANG_CODE, ending_texts["en"])
              asyncio.run(generate_voiceover(ending_text, str(ending_audio_path)))
              ending_audio = AudioFileClip(str(ending_audio_path))
              ending_clip = ImageClip(str(ending_path)).set_duration(ending_audio.duration + 2).set_audio(ending_audio)
              clips.append(ending_clip)

              # Combine clips
              print("\nCombining all clips...")
              final = concatenate_videoclips(clips, method="compose")

              # Output
              timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
              safe_title = "".join(c for c in title if c.isalnum() or c in " -_").strip()[:50]
              output_path = OUTPUT_DIR / f"{safe_title}_{timestamp}.mp4"

              print(f"\nRendering HIGH QUALITY video to {output_path}...")
              final.write_videofile(
                  str(output_path),
                  fps=30,  # Higher frame rate for smoother motion
                  codec='libx264',
                  audio_codec='aac',
                  bitrate='8000k',  # Higher bitrate for better quality
                  audio_bitrate='192k',  # Better audio quality
                  preset='medium',  # Balance between quality and speed
                  ffmpeg_params=['-crf', '18'],  # High quality encoding
                  verbose=False,
                  logger=None
              )

              # Get video duration
              duration_mins = final.duration / 60
              print(f"\nVideo duration: {duration_mins:.1f} minutes")

              # Cleanup temp files
              for f in TEMP_DIR.glob("*"):
                  try:
                      f.unlink()
                  except:
                      pass

              print(f"\n{'='*60}")
              print(f"VIDEO CREATED: {output_path}")
              print(f"{'='*60}\n")

              return str(output_path), title

          # Main execution
