              # Optimized Ken Burns effect - smoother and faster rendering
              def create_cinematic_clip(img_path, duration, effect_type):
                  """Create smooth cinematic Ken Burns effect with optimized performance"""
                  w, h = 1280, 720

                  # Load and resize image larger for zoom/pan headroom
                  pil_img = Image.open(str(img_path))
                  pil_img = pil_img.resize((1600, 900), Image.Resampling.LANCZOS)  # 25% larger

                  # Convert to numpy for faster processing
                  import numpy as np
                  img_array = np.array(pil_img)

                  def make_frame(t):
                      progress = t / duration  # 0 to 1

                      if effect_type == 'zoom_in':
                          # Smooth zoom in: start at full view, end zoomed in
                          scale = 1.0 + (0.15 * progress)  # 1.0 to 1.15
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      elif effect_type == 'zoom_out':
                          # Smooth zoom out: start zoomed in, end at full view
                          scale = 1.15 - (0.15 * progress)  # 1.15 to 1.0
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      elif effect_type == 'pan_right':
                          # Smooth pan from left to right
                          crop_w, crop_h = 1280, 720
                          x1 = int((1600 - 1280) * progress)  # 0 to 320
                          y1 = (900 - 720) // 2

                      elif effect_type == 'pan_left':
                          # Smooth pan from right to left
                          crop_w, crop_h = 1280, 720
                          x1 = int((1600 - 1280) * (1 - progress))  # 320 to 0
                          y1 = (900 - 720) // 2

                      elif effect_type == 'zoom_pan_right':
                          # Zoom in while panning right
                          scale = 1.0 + (0.1 * progress)
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = int((1600 - crop_w) * progress * 0.5)
                          y1 = (900 - crop_h) // 2

                      else:  # subtle
                          # Very subtle zoom for calm scenes
                          scale = 1.0 + (0.08 * progress)
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      # Crop and resize to output dimensions
                      cropped = img_array[y1:y1+crop_h, x1:x1+crop_w]
                      # Use PIL for high-quality resize
                      pil_cropped = Image.fromarray(cropped)
                      pil_resized = pil_cropped.resize((w, h), Image.Resampling.LANCZOS)
                      return np.array(pil_resized)

                  from moviepy.video.VideoClip import VideoClip
                  clip = VideoClip(make_frame, duration=duration)
                  return clip

              # Effect sequence for variety - more effects for visual interest
              effect_types = ['zoom_in', 'pan_right', 'zoom_out', 'pan_left', 'zoom_pan_right', 'zoom_in', 'pan_left', 'zoom_out']

              # Process each scene with smooth cinematic effects
              for i, scene in enumerate(scenes):
                  narration_preview = scene['narration'][:60].replace('\n', ' ')
                  print(f"\nScene {i+1}/{len(scenes)}: {narration_preview}...")

                  # Download image
                  img_path = TEMP_DIR / f"scene_{i}.jpg"
                  download_image(scene['image_prompt'], str(img_path))

                  # Generate voiceover
                  audio_path = TEMP_DIR / f"audio_{i}.mp3"
                  asyncio.run(generate_voiceover(scene['narration'], str(audio_path)))

                  # Create smooth cinematic clip
                  audio = AudioFileClip(str(audio_path))
                  duration = audio.duration + 1.5  # Slight pause between scenes

                  # Select effect type (cycles through different effects)
                  effect = effect_types[i % len(effect_types)]
                  print(f"  Applying smooth {effect} effect...")

                  try:
                      clip = create_cinematic_clip(img_path, duration, effect)
                      clip = clip.set_audio(audio)
                  except Exception as e:
                      print(f"  Cinematic effect failed, using static: {e}")
                      clip = ImageClip(str(img_path)).set_duration(duration).set_audio(audio)

                  clips.append(clip)

              # 4. Create ending card with moral
              print("\nCreating ending card...")
              ending_path = TEMP_DIR / "ending.jpg"
              create_ending_card(moral, ending_path)
              ending_audio_path = TEMP_DIR / "ending_audio.mp3"

              # Language-specific ending
              ending_texts = {
                  "en": f"And that's the end of our story! Remember children: {moral}. Please like and subscribe for more wonderful stories. See you next time! Goodbye!",
                  "hi": f"और यह हमारी कहानी का अंत है! याद रखें बच्चों: {moral}. अगली कहानी के लिए सब्सक्राइब करें! अलविदा!",
                  "ta": f"இது எங்கள் கதையின் முடிவு! நினைவில் கொள்ளுங்கள்: {moral}. மேலும் கதைகளுக்கு சந்தா செலுத்துங்கள்!",
                  "te": f"ఇది మా కథ ముగింపు! గుర్తుంచుకోండి: {moral}. మరిన్ని కథలకు సబ్స్క్రైబ్ చేయండి!",
                  "kn": f"ಇದು ನಮ್ಮ ಕಥೆಯ ಕೊನೆ! ನೆನಪಿಡಿ: {moral}. ಹೆಚ್ಚಿನ ಕಥೆಗಳಿಗೆ ಚಂದಾದಾರರಾಗಿ!",
                  "ml": f"ഇത് നമ്മുടെ കഥയുടെ അവസാനം! ഓർക്കുക: {moral}. കൂടുതൽ കഥകൾക്കായി സബ്സ്ക്രൈബ് ചെയ്യുക!",
                  "bn": f"এই আমাদের গল্পের শেষ! মনে রেখো: {moral}. আরও গল্পের জন্য সাবস্ক্রাইব করো!",
                  "mr": f"ही आमच्या गोष्टीचा शेवट! लक्षात ठेवा: {moral}. अधिक गोष्टींसाठी सबस्क्राइब करा!"
              }
              ending_text = ending_texts.get(LANG_CODE, ending_texts["en"])
              asyncio.run(generate_voiceover(ending_text, str(ending_audio_path)))
              ending_audio = AudioFileClip(str(ending_audio_path))
              ending_clip = ImageClip(str(ending_path)).set_duration(ending_audio.duration + 2).set_audio(ending_audio)
              clips.append(ending_clip)

              # Combine clips
              print("\nCombining all clips...")
              final = concatenate_videoclips(clips, method="compose")

              # Output
              timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
              safe_title = "".join(c for c in title if c.isalnum() or c in " -_").strip()[:50]
              output_path = OUTPUT_DIR / f"{safe_title}_{timestamp}.mp4"

              print(f"\nRendering HIGH QUALITY video to {output_path}...")
              final.write_videofile(
                  str(output_path),
                  fps=30,  # Higher frame rate for smoother motion
                  codec='libx264',
                  audio_codec='aac',
                  bitrate='8000k',  # Higher bitrate for better quality
                  audio_bitrate='192k',  # Better audio quality
                  preset='medium',  # Balance between quality and speed
                  ffmpeg_params=['-crf', '18'],  # High quality encoding
                  verbose=False,
                  logger=None
              )

              # Get video duration
              duration_mins = final.duration / 60
              print(f"\nVideo duration: {duration_mins:.1f} minutes")

              # Cleanup temp files
              for f in TEMP_DIR.glob("*"):
                  try:
                      f.unlink()
                  except:
                      pass

              print(f"\n{'='*60}")
              print(f"VIDEO CREATED: {output_path}")
              print(f"{'='*60}\n")

              return str(output_path), title

          # Main execution
          print("Starting Kids Story Video Generator...")
          print(f"Mode: {'TEST (5 scenes)' if TEST_MODE else 'FULL (20 scenes for 10 min)'}")
          print(f"Language: {LANG_NAME}")
          print(f"Voice: {VOICE}")
          print(f"Age Group: 4+ years")

          # Select random topic
          topic = random.choice(TRENDING_TOPICS)
          print(f"Selected topic: {topic}")

          # Generate story
          print("\nGenerating moral story...")
          story = generate_story_with_groq(topic, NUM_SCENES)
          print(f"Story title: {story.get('title', 'Unknown')}")
          print(f"Moral: {story.get('moral', 'Be kind and good')}")
          print(f"Number of scenes: {len(story.get('scenes', []))}")

          # Create video
          video_path, video_title = create_video(story)

          # Save metadata for upload step
          metadata = {
              "video_path": video_path,
              "title": video_title,
              "topic": topic,
              "language": LANG_NAME,
              "lang_code": LANG_CODE,
              "moral": story.get('moral', 'Be kind and good')
          }
          with open("video_metadata.json", "w") as f:
              json.dump(metadata, f)

          print("Video generation complete!")
          SCRIPT

      # YouTube upload is disabled - use youtube-uploader.yml workflow instead
      # To enable: run the separate "Upload to YouTube" workflow after reviewing the video

      - name: Prepare release files
        id: prepare-release
        run: |
          # Get video info from metadata
          if [ -f video_metadata.json ]; then
            TITLE=$(cat video_metadata.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('title', 'Unknown'))")
            MORAL=$(cat video_metadata.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('moral', 'Be kind!'))")
            LANGUAGE=$(cat video_metadata.json | python3 -c "import sys, json; print(json.load(sys.stdin).get('language', 'English'))")
          else
            TITLE="Kids-Story"
            MORAL="Be kind and good!"
            LANGUAGE="English"
          fi

          # Create tag-safe name (lowercase, no spaces, no special chars)
          TAG_NAME=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          TAG_NAME="${TAG_NAME}-$(date +%Y%m%d-%H%M%S)"

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "moral=$MORAL" >> $GITHUB_OUTPUT
          echo "language=$LANGUAGE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Find video file
          VIDEO_FILE=$(find ./output -name "*.mp4" -type f | head -1)
          echo "video_file=$VIDEO_FILE" >> $GITHUB_OUTPUT

          echo "Tag: $TAG_NAME"
          echo "Title: $TITLE"
          echo "Video: $VIDEO_FILE"

      - name: Upload video and thumbnail as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: kids-story-video
          path: |
            output/*.mp4
            output/thumbnail.jpg
            video_metadata.json
          retention-days: 7

      - name: Create GitHub Release with video
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.prepare-release.outputs.tag_name }}
          name: "🎬 ${{ steps.prepare-release.outputs.title }}"
          body: |
            ## 📖 Kids Story Video

            **Title:** ${{ steps.prepare-release.outputs.title }}
            **Language:** ${{ steps.prepare-release.outputs.language }}
            **Moral:** ${{ steps.prepare-release.outputs.moral }}
            **Age Group:** 4+ years

            ---

            ### 📥 Download the video and thumbnail below

            ### 📺 To upload to YouTube:
            1. Go to **Actions** → **Upload to YouTube**
            2. Enter tag: `${{ steps.prepare-release.outputs.tag_name }}`
            3. Click **Run workflow**
          files: |
            ${{ steps.prepare-release.outputs.video_file }}
            output/thumbnail.jpg
            video_metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Kids Story Video Generator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Video generated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📖 **Story:** ${{ steps.prepare-release.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "🎓 **Moral:** ${{ steps.prepare-release.outputs.moral }}" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Language:** ${{ steps.prepare-release.outputs.language }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.prepare-release.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📺 To Upload to YouTube:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **Actions** → **Upload to YouTube**" >> $GITHUB_STEP_SUMMARY
          echo "2. Enter tag: \`${{ steps.prepare-release.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Click **Run workflow**" >> $GITHUB_STEP_SUMMARY
