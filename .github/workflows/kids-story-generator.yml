              # Optimized Ken Burns effect - smoother and faster rendering
              def create_cinematic_clip(img_path, duration, effect_type):
                  """Create smooth cinematic Ken Burns effect with optimized performance"""
                  w, h = 1280, 720

                  # Load and resize image larger for zoom/pan headroom
                  pil_img = Image.open(str(img_path))
                  pil_img = pil_img.resize((1600, 900), Image.Resampling.LANCZOS)  # 25% larger

                  # Convert to numpy for faster processing
                  import numpy as np
                  img_array = np.array(pil_img)

                  def make_frame(t):
                      progress = t / duration  # 0 to 1

                      if effect_type == 'zoom_in':
                          # Smooth zoom in: start at full view, end zoomed in
                          scale = 1.0 + (0.15 * progress)  # 1.0 to 1.15
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      elif effect_type == 'zoom_out':
                          # Smooth zoom out: start zoomed in, end at full view
                          scale = 1.15 - (0.15 * progress)  # 1.15 to 1.0
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      elif effect_type == 'pan_right':
                          # Smooth pan from left to right
                          crop_w, crop_h = 1280, 720
                          x1 = int((1600 - 1280) * progress)  # 0 to 320
                          y1 = (900 - 720) // 2

                      elif effect_type == 'pan_left':
                          # Smooth pan from right to left
                          crop_w, crop_h = 1280, 720
                          x1 = int((1600 - 1280) * (1 - progress))  # 320 to 0
                          y1 = (900 - 720) // 2

                      elif effect_type == 'zoom_pan_right':
                          # Zoom in while panning right
                          scale = 1.0 + (0.1 * progress)
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = int((1600 - crop_w) * progress * 0.5)
                          y1 = (900 - crop_h) // 2

                      else:  # subtle
                          # Very subtle zoom for calm scenes
                          scale = 1.0 + (0.08 * progress)
                          crop_w = int(1600 / scale)
                          crop_h = int(900 / scale)
                          x1 = (1600 - crop_w) // 2
                          y1 = (900 - crop_h) // 2

                      # Crop and resize to output dimensions
                      cropped = img_array[y1:y1+crop_h, x1:x1+crop_w]
                      # Use PIL for high-quality resize
                      pil_cropped = Image.fromarray(cropped)
                      pil_resized = pil_cropped.resize((w, h), Image.Resampling.LANCZOS)
                      return np.array(pil_resized)

                  from moviepy.video.VideoClip import VideoClip
                  clip = VideoClip(make_frame, duration=duration)
                  return clip

              # Effect sequence for variety - more effects for visual interest
              effect_types = ['zoom_in', 'pan_right', 'zoom_out', 'pan_left', 'zoom_pan_right', 'zoom_in', 'pan_left', 'zoom_out']

              # Process each scene with smooth cinematic effects
              for i, scene in enumerate(scenes):
                  narration_preview = scene['narration'][:60].replace('\n', ' ')
