                      bg_color = colors[i % len(colors)]
                      placeholder = Image.new('RGB', (1280, 720), bg_color)
                      draw = ImageDraw.Draw(placeholder)
                      # Add gradient
                      for y in range(720):
                          alpha = y / 720
                          r = int(bg_color[0] * (1 - alpha * 0.3))
